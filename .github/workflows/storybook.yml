name: Deploy Branch Storybook

on:
  push:
    branches:
      - '**' # Matches master, feature/xyz, hotfix-123, etc.
  workflow_dispatch:

# Cancel previous builds on the same branch to save action minutes
concurrency:
  group: storybook-deploy-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write # Required to push assets to the gh-pages branch

jobs:
  deploy-storybook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Determine Target Subdirectory
        id: branch-info
        run: |
          # Since we only trigger on push, ref_name gives us the clean branch name (e.g., feature/login)
          RAW_BRANCH="${{ github.ref_name }}"
          
          # Replace slashes and special characters with dashes instead of dots
          SAFE_BRANCH=$(echo "$RAW_BRANCH" | sed 's/[^a-zA-Z0-9_-]/-/g')
          
          echo "folder_name=$SAFE_BRANCH" >> $GITHUB_OUTPUT

      - name: Build Storybook
        run: npm run build-storybook
        env:
          # Injects absolute asset routing: /repo-name/branch-name/
          STORYBOOK_BASE: /${{ github.event.repository.name }}/${{ steps.branch-info.outputs.folder_name }}/

      - name: Deploy Subdirectory to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: storybook-static
          target-folder: ${{ steps.branch-info.outputs.folder_name }} # Places build inside branch folder
          clean: false # Prevents overwriting other active branch builds