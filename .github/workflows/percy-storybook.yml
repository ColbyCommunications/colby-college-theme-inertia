name: Percy Storybook

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: percy-storybook-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  percy-storybook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Run Percy Storybook snapshots
        run: |
          # 1. Install a simple static server
          npm install -g serve
          
          # 2. Start the server in the background and wait for it
          serve -l 6006 storybook-static &
          
          # 3. Give it a few seconds to boot up
          sleep 5
          
          # 4. Use 'percy storybook' but point to the live URL
          npx percy storybook http://localhost:6006 --include "^Templates/Page Show/.*" -v
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
