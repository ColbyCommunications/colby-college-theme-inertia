name: Percy Storybook

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: percy-storybook-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  percy-storybook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Run Percy Storybook snapshots
        run: |
          # 1. Install http-server (lighter and more standard for this)
          npm install -g http-server
          
          # 2. Start the server on port 6006
          # -c-1 disables caching so Percy always gets the fresh build
          npx http-server ./storybook-static -p 6006 -c-1 &
          
          # 3. Wait for the server to actually be alive
          npx wait-on http://127.0.0.1:6006/iframe.html -t 30000
          
          # 4. Run Percy against the local IP to avoid localhost IPv6 issues
          npx percy storybook http://127.0.0.1:6006 --include "^Templates/Page Show/.*" -v
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          PERCY_BROWSER_EXECUTABLE: /usr/bin/google-chrome
