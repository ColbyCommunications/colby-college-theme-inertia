name: Percy Storybook

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: percy-storybook-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  percy-storybook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Run Percy Storybook snapshots
        run: |
          # 1. Install serve
          npm install -g serve
          
          # 2. Start the server (using -s to handle SPA-like routing if needed)
          # We use 0.0.0.0 to ensure it listens on all interfaces
          npx serve -l 6006 ./storybook-static &
          
          # 3. Wait for the server to be ready
          npx wait-on http://localhost:6006/iframe.html -t 30000
          
          # 4. Point Percy to the EXACT URL with the trailing slash
          npx percy storybook http://localhost:6006/ --include "^Templates/Page Show/.*" -v
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
